name: Nightly Dashboard Refresh

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6:00 AM UTC (midnight-1am Central)
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run dashboard builder
        env:
          CTM_AUTH: ${{ secrets.CTM_AUTH }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python build_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "Strive Analytics Bot"
          git config user.email "analytics@striverecovery.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
