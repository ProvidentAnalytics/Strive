name: Dashboard Refresh

on:
  schedule:
    # Central Time = UTC-5 (standard) / UTC-6 (daylight saving)
    # Currently CDT (UTC-5), so:
    # 11:00 AM CDT = 16:00 UTC
    #  3:00 PM CDT = 20:00 UTC
    #  7:00 PM CDT = 00:00 UTC (next day)
    - cron: '0 16 * * *'   # 11:00 AM Central
    - cron: '0 20 * * *'   #  3:00 PM Central
    - cron: '0 0  * * *'   #  7:00 PM Central
  workflow_dispatch:         # Manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyNaCl

      - name: Run dashboard builder
        env:
          CTM_AUTH: ${{ secrets.CTM_AUTH }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python build_dashboard.py
